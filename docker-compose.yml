services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omahaunderground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omahaunderground}
      POSTGRES_DB: ${POSTGRES_DB:-omahaunderground}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omahaunderground}"]
      interval: 5s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev
    ports:
      - "1025:1025"
      - "1080:1080"

  app:
    build: .
    command: >
      sh -c "uv run python manage.py migrate --noinput &&
             uv run python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://omahaunderground:omahaunderground@db:5432/omahaunderground
      EMAIL_HOST: maildev
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - venv_data:/app/.venv

volumes:
  db_data:
  venv_data:
